
<style>
  .gen-wrap { padding: 1.5rem 0; max-width: 600px; margin: 0 auto; }
  .header { margin-bottom: 1.5rem; }
  .header h2 { font-size: 22px; font-weight: 500; margin: 0 0 4px; color: var(--color-text-primary); }
  .header p { font-size: 14px; color: var(--color-text-secondary); margin: 0; }
  .badge { display: inline-block; font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 99px; background: var(--color-background-info); color: var(--color-text-info); margin-bottom: 8px; }
  .pw-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-lg); padding: 1.25rem; margin-bottom: 1rem; }
  .pw-display { font-family: var(--font-mono); font-size: 18px; font-weight: 500; color: var(--color-text-primary); word-break: break-all; letter-spacing: 0.02em; margin-bottom: 1rem; min-height: 28px; }
  .pw-parts { display: flex; gap: 0; flex-wrap: wrap; align-items: baseline; }
  .pw-prefix { color: var(--color-text-info); }
  .pw-nums { color: var(--color-text-warning); }
  .pw-syms { color: var(--color-text-danger); }
  .pw-copy-row { display: flex; gap: 8px; align-items: center; }
  .copy-btn { flex: 1; padding: 8px 16px; font-size: 14px; cursor: pointer; border-radius: var(--border-radius-md); background: transparent; border: 0.5px solid var(--color-border-secondary); color: var(--color-text-primary); transition: background 0.15s; }
  .copy-btn:hover { background: var(--color-background-secondary); }
  .gen-btn { flex: 2; padding: 8px 16px; font-size: 14px; cursor: pointer; border-radius: var(--border-radius-md); background: var(--color-background-info); border: none; color: var(--color-text-info); font-weight: 500; transition: opacity 0.15s; }
  .gen-btn:hover { opacity: 0.85; }
  .copy-feedback { font-size: 13px; color: var(--color-text-success); min-width: 48px; }
  .controls { background: var(--color-background-secondary); border-radius: var(--border-radius-lg); padding: 1.25rem; margin-bottom: 1rem; display: flex; flex-direction: column; gap: 1rem; }
  .ctrl-row { display: flex; align-items: center; gap: 12px; }
  .ctrl-label { font-size: 13px; color: var(--color-text-secondary); min-width: 130px; }
  .ctrl-val { font-size: 13px; font-weight: 500; min-width: 24px; color: var(--color-text-primary); }
  .toggle-row { display: flex; align-items: center; gap: 10px; }
  .toggle { position: relative; width: 36px; height: 20px; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .slider { position: absolute; inset: 0; background: var(--color-border-secondary); border-radius: 20px; cursor: pointer; transition: 0.2s; }
  .slider:before { content: ''; position: absolute; height: 14px; width: 14px; left: 3px; bottom: 3px; background: var(--color-background-primary); border-radius: 50%; transition: 0.2s; }
  .toggle input:checked + .slider { background: var(--color-background-info); }
  .toggle input:checked + .slider:before { transform: translateX(16px); }
  .toggle-label { font-size: 13px; color: var(--color-text-secondary); }
  .history-wrap { margin-top: 0.5rem; }
  .history-title { font-size: 13px; color: var(--color-text-tertiary); margin-bottom: 8px; }
  .history-list { display: flex; flex-direction: column; gap: 6px; }
  .hist-item { font-family: var(--font-mono); font-size: 12px; color: var(--color-text-secondary); background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 6px 10px; cursor: pointer; transition: background 0.1s; }
  .hist-item:hover { background: var(--color-background-tertiary); color: var(--color-text-primary); }
  .strength-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
  .strength-bar { flex: 1; height: 4px; border-radius: 2px; background: var(--color-border-tertiary); overflow: hidden; }
  .strength-fill { height: 100%; border-radius: 2px; transition: width 0.3s, background 0.3s; }
  .strength-label { font-size: 12px; min-width: 48px; color: var(--color-text-secondary); }
</style>

<div class="gen-wrap">
  <div class="header">
    <div class="badge">github-ready</div>
    <h2>Goofygen password generator</h2>
    <p>Passwords always start with <code>Goofygen$</code> followed by numbers and symbols.</p>
  </div>

  <div class="pw-card">
    <div class="pw-display" id="pw-display">
      <span class="pw-parts" id="pw-parts"></span>
    </div>
    <div class="strength-row">
      <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
      <span class="strength-label" id="strength-label"></span>
    </div>
    <div style="margin-top: 12px;">
      <div class="pw-copy-row">
        <button class="copy-btn" onclick="copyPw()">Copy</button>
        <button class="gen-btn" onclick="generate()">Generate new</button>
        <span class="copy-feedback" id="copy-fb"></span>
      </div>
    </div>
  </div>

  <div class="controls">
    <div class="ctrl-row">
      <span class="ctrl-label">Extra number digits</span>
      <input type="range" min="2" max="10" value="4" step="1" id="num-len" style="flex:1;" oninput="document.getElementById('num-val').textContent=this.value; generate()">
      <span class="ctrl-val" id="num-val">4</span>
    </div>
    <div class="ctrl-row">
      <span class="ctrl-label">Extra symbols</span>
      <input type="range" min="1" max="8" value="3" step="1" id="sym-len" style="flex:1;" oninput="document.getElementById('sym-val').textContent=this.value; generate()">
      <span class="ctrl-val" id="sym-val">3</span>
    </div>
    <div class="toggle-row">
      <label class="toggle"><input type="checkbox" id="tog-upper" checked onchange="generate()"><span class="slider"></span></label>
      <span class="toggle-label">Uppercase in suffix</span>
    </div>
    <div class="toggle-row">
      <label class="toggle"><input type="checkbox" id="tog-extra" onchange="generate()"><span class="slider"></span></label>
      <span class="toggle-label">Extra random words</span>
    </div>
  </div>

  <div class="history-wrap">
    <div class="history-title">Recent — click to copy</div>
    <div class="history-list" id="history"></div>
  </div>
</div>

<script>
const SYMBOLS = '!@#%^&*_+=~';
const NUMS = '0123456789';
const UPPER = 'ABCDEFGHJKLMNPQRSTUVWXYZ';
const WORDS = ['blaze','comet','pixel','turbo','nexus','delta','omega','storm','swift','lunar','solar','prime','frost','spark','venom','hyper','ultra','nova','flux','grid'];

let history = [];
let currentPw = '';

function rand(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function randN(chars, n){ let s=''; for(let i=0;i<n;i++) s+=rand(chars.split('')); return s; }

function generate(){
  const numLen = parseInt(document.getElementById('num-len').value);
  const symLen = parseInt(document.getElementById('sym-len').value);
  const useUpper = document.getElementById('tog-upper').checked;
  const useExtra = document.getElementById('tog-extra').checked;

  const prefix = 'Goofygen$';
  const nums = randN(NUMS, numLen);
  const syms = randN(SYMBOLS, symLen);
  const uppers = useUpper ? randN(UPPER, 2) : '';
  const extra = useExtra ? rand(WORDS) : '';

  const shuffled = shuffle((nums + syms + uppers + extra).split('')).join('');
  currentPw = prefix + shuffled;

  renderPw(prefix, shuffled);
  updateStrength(currentPw);
  addHistory(currentPw);
  document.getElementById('copy-fb').textContent = '';
}

function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

function renderPw(prefix, suffix){
  const el = document.getElementById('pw-parts');
  const numChars = suffix.match(/[0-9]/g)||[];
  const symChars = suffix.match(/[^0-9a-zA-Z]/g)||[];
  let html = `<span class="pw-prefix">${prefix}</span>`;
  for(const c of suffix){
    if(/[0-9]/.test(c)) html += `<span class="pw-nums">${c}</span>`;
    else if(/[^a-zA-Z]/.test(c)) html += `<span class="pw-syms">${c}</span>`;
    else html += `<span>${c}</span>`;
  }
  el.innerHTML = html;
}

function updateStrength(pw){
  const len = pw.length;
  let score = 0;
  if(len >= 16) score++;
  if(len >= 20) score++;
  if(/[A-Z]/.test(pw)) score++;
  if(/[0-9]/.test(pw)) score++;
  if(/[^a-zA-Z0-9]/.test(pw)) score++;

  const fill = document.getElementById('strength-fill');
  const label = document.getElementById('strength-label');
  const pct = Math.min(100, score * 20);
  fill.style.width = pct + '%';
  if(score <= 2){ fill.style.background='var(--color-text-danger)'; label.textContent='weak'; }
  else if(score <= 3){ fill.style.background='var(--color-text-warning)'; label.textContent='fair'; }
  else if(score <= 4){ fill.style.background='var(--color-text-info)'; label.textContent='strong'; }
  else { fill.style.background='var(--color-text-success)'; label.textContent='excellent'; }
}

function addHistory(pw){
  if(history[0]===pw) return;
  history.unshift(pw);
  if(history.length>5) history.pop();
  const el = document.getElementById('history');
  el.innerHTML = history.map(p=>`<div class="hist-item" onclick="copyText('${p}')" title="click to copy">${p}</div>`).join('');
}

function copyPw(){ copyText(currentPw); }

function copyText(text){
  navigator.clipboard.writeText(text).then(()=>{
    const fb = document.getElementById('copy-fb');
    fb.textContent = 'Copied!';
    setTimeout(()=>fb.textContent='', 2000);
  });
}

generate();
</script>
